worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

  server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── ABS unauthenticated endpoints ──
    location = /status {
      proxy_pass         ${ABS_HOST}/status;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
    }

    # OIDC callback: SPA handles the browser redirect (receives ?code= or ?token=).
    location = /auth/callback {
      try_files $uri /index.html;
    }

    # OIDC initiation: proxied so ABS sets its session cookie on this origin.
    # Host must be the external ABS hostname so ABS builds a mobile-redirect URI
    # that matches the OIDC provider's registered callback.
    location = /auth/openid {
      proxy_pass         ${ABS_HOST}/auth/openid;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              ${ABS_EXTERNAL_HOST};
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # PKCE token exchange: ABS session cookie (now same-origin) is forwarded here.
    location = /auth/openid/callback {
      proxy_pass         ${ABS_HOST}/auth/openid/callback;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── ABS API proxy ──
    # Set ABS_HOST at container start via envsubst, e.g. http://abs:13378
    location /api/ {
      proxy_pass         ${ABS_HOST}/api/;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── ABS Socket.io proxy ──
    location /socket.io/ {
      proxy_pass         ${ABS_HOST}/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_read_timeout 3600s;
    }

    # ── ABS HLS stream proxy ──
    location /hls/ {
      proxy_pass       ${ABS_HOST}/hls/;
      proxy_set_header Host $host;
    }
  }
}
